name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -c "import glob, subprocess, sys; subprocess.check_call([sys.executable, '-m', 'twine', 'check', *glob.glob('dist/*')])"
